# IFX UI Overlay v1 reverse-proxy injection (tailored for IFX hosts)
# Environments:
# - Production: www.ifxtrades.com, ifxtrades.com
# - Staging/Preview: ifxtrades-shp4.vercel.app, *-ifxtrades-shp4.vercel.app
#
# Behavior:
# - Staging/Preview: overlay always ON
# - Production: overlay ON when:
#   1) cookie ifx_ui_overlay_v1=1, OR
#   2) deterministic rollout bucket (default 5%)
#
# To change rollout, edit split_clients from 5% to desired percentage.

map $host $ifx_ui_overlay_env {
  default none;
  ifxtrades.com prod;
  www.ifxtrades.com prod;
  ifxtrades-shp4.vercel.app staging;
  ~^.+-ifxtrades-shp4\.vercel\.app$ staging;
}

map $http_cookie $ifx_ui_overlay_cookie_force {
  default 0;
  ~*ifx_ui_overlay_v1=1 1;
}

split_clients "${remote_addr}${http_user_agent}" $ifx_ui_overlay_rollout_5 {
  5% 1;
  * 0;
}

map "$ifx_ui_overlay_env:$ifx_ui_overlay_cookie_force:$ifx_ui_overlay_rollout_5" $ifx_ui_overlay_enabled {
  default 0;
  "~^staging:" 1;
  "~^prod:1:" 1;
  "~^prod:0:1$" 1;
}

map $ifx_ui_overlay_env $ifx_ui_overlay_asset_base {
  default "";
  prod "https://www.ifxtrades.com/ui-overlay/v1";
  staging "https://ifxtrades-shp4.vercel.app/ui-overlay/v1";
}

map $ifx_ui_overlay_enabled $ifx_ui_overlay_head {
  default "";
  1 "<script>window.__IFX_FEATURE_FLAGS__=window.__IFX_FEATURE_FLAGS__||{};window.__IFX_FEATURE_FLAGS__['feature/ui_overlay_v1']=true;window.__IFX_UI_OVERLAY_SETTINGS__={theme:'dark',motion:'auto'};</script><link rel='stylesheet' href='$ifx_ui_overlay_asset_base/tokens.css'><link rel='stylesheet' href='$ifx_ui_overlay_asset_base/overlay.css'><script defer src='$ifx_ui_overlay_asset_base/overlay.js'></script>";
}

# In your target server/location block (HTML responses only):
# sub_filter_once on;
# sub_filter_types text/html;
# sub_filter "</head>" "$ifx_ui_overlay_head</head>";
